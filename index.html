<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Aptitude & Grammar Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Custom scrollbar for better mobile experience */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen flex items-center justify-center p-4 md:p-6 lg:p-8">

    <div id="app" class="w-full max-w-4xl transition-all duration-300">
        <!-- Content gets injected here by JavaScript -->
    </div>

    <script>
        // Database of 200 Questions (100 Math, 100 Grammar split into 20 Easy, 20 Medium, 20 Hard, 40 Extreme)
        const allQuizData = [
            // ================= MATH: EASY (20 Questions) =================
            { cat: 'math', diff: 'easy', q: "A product costs ₹500 and is sold at 20% profit. What is the selling price?", options: ["₹550", "₹600", "₹620", "₹580"], answer: 1, hint: "Formula: Selling Price (SP) = Cost Price (CP) + (Profit % × CP)." },
            { cat: 'math', diff: 'easy', q: "What is 15% of 200?", options: ["20", "25", "30", "35"], answer: 2, hint: "Formula: (Percentage / 100) × Value." },
            { cat: 'math', diff: 'easy', q: "If A : B = 3 : 4 and A is 15, what is B?", options: ["16", "20", "24", "12"], answer: 1, hint: "Formula: If 3 units = 15, then 1 unit = 5. So, 4 units = 20." },
            { cat: 'math', diff: 'easy', q: "The average of 4, 8, 12, and 16 is:", options: ["8", "10", "12", "14"], answer: 1, hint: "Formula: Average = Sum of elements / Number of elements. (4+8+12+16)/4 = 10." },
            { cat: 'math', diff: 'easy', q: "Find the simple interest on ₹1,000 at 5% per annum for 2 years.", options: ["₹50", "₹100", "₹150", "₹200"], answer: 1, hint: "Formula: SI = (P × R × T) / 100. (1000 × 5 × 2) / 100 = 100." },
            { cat: 'math', diff: 'easy', q: "Convert 36 km/hr to m/s.", options: ["10 m/s", "12 m/s", "15 m/s", "18 m/s"], answer: 0, hint: "Formula: Speed in m/s = Speed in km/hr × (5 / 18). 36 × (5/18) = 10." },
            { cat: 'math', diff: 'easy', q: "If the cost price of an item is ₹200 and it is sold for ₹150, what is the loss percentage?", options: ["20%", "25%", "30%", "15%"], answer: 1, hint: "Formula: Loss % = (Loss / CP) × 100. (50 / 200) × 100 = 25%." },
            { cat: 'math', diff: 'easy', q: "A man covers 20 km in 2 hours. What is his speed?", options: ["5 km/hr", "10 km/hr", "15 km/hr", "20 km/hr"], answer: 1, hint: "Formula: Speed = Distance / Time. 20 / 2 = 10." },
            { cat: 'math', diff: 'easy', q: "Solve: 25 + 15 × 2", options: ["80", "55", "70", "60"], answer: 1, hint: "Rule: BODMAS. Multiplication comes before addition. 25 + 30 = 55." },
            { cat: 'math', diff: 'easy', q: "If 5 men can do a work in 10 days, how many days will 1 man take?", options: ["2 days", "15 days", "50 days", "25 days"], answer: 2, hint: "Formula: M1 × D1 = M2 × D2. 5 × 10 = 1 × D2. D2 = 50." },
            { cat: 'math', diff: 'easy', q: "Simplify: 4/5 of 100", options: ["60", "80", "75", "90"], answer: 1, hint: "Rule: 'Of' means multiplication. (4/5) × 100 = 80." },
            { cat: 'math', diff: 'easy', q: "What is the square root of 144?", options: ["10", "12", "14", "16"], answer: 1, hint: "Basic Math: 12 × 12 = 144." },
            { cat: 'math', diff: 'easy', q: "A train 100m long passes a pole in 5 seconds. Find its speed in m/s.", options: ["15 m/s", "20 m/s", "25 m/s", "30 m/s"], answer: 1, hint: "Formula: Speed = Length of train / Time taken to pass pole. 100 / 5 = 20." },
            { cat: 'math', diff: 'easy', q: "The sum of two numbers is 30 and their difference is 10. What is the larger number?", options: ["15", "20", "25", "10"], answer: 1, hint: "Equations: x + y = 30; x - y = 10. Adding them: 2x = 40 => x = 20." },
            { cat: 'math', diff: 'easy', q: "Which of the following is a prime number?", options: ["9", "15", "21", "23"], answer: 3, hint: "Definition: A prime number is only divisible by 1 and itself." },
            { cat: 'math', diff: 'easy', q: "10% of x is 50. What is x?", options: ["100", "500", "200", "250"], answer: 1, hint: "Equation: (10/100) × x = 50 => x = 500." },
            { cat: 'math', diff: 'easy', q: "A car uses 5 liters of petrol to travel 100 km. How many liters are needed for 250 km?", options: ["10", "12.5", "15", "20"], answer: 1, hint: "Unitary Method: 100km = 5L => 1km = 5/100L. 250km = (5/100) × 250 = 12.5L." },
            { cat: 'math', diff: 'easy', q: "Express 3/4 as a percentage.", options: ["60%", "70%", "75%", "80%"], answer: 2, hint: "Formula: Fraction × 100. (3/4) × 100 = 75%." },
            { cat: 'math', diff: 'easy', q: "Find the missing number in the series: 2, 4, 8, 16, __", options: ["24", "30", "32", "36"], answer: 2, hint: "Pattern: Each number is multiplied by 2." },
            { cat: 'math', diff: 'easy', q: "Calculate the perimeter of a rectangle with length 10m and width 5m.", options: ["15m", "30m", "50m", "20m"], answer: 1, hint: "Formula: Perimeter = 2(Length + Width). 2(10 + 5) = 30m." },

            // ================= MATH: MEDIUM (20 Questions) =================
            { cat: 'math', diff: 'medium', q: "A student needs 40% marks to pass an exam. He scores 160 marks and fails by 40 marks. What are the maximum marks?", options: ["400", "450", "500", "600"], answer: 2, hint: "Formula: Passing Marks = (Pass % / 100) × Max Marks. 160 + 40 = 200 = 40% of Max. Max = 500." },
            { cat: 'math', diff: 'medium', q: "If the price of a laptop increases by 10% and then decreases by 10%, what is the net change?", options: ["0% change", "1% increase", "1% decrease", "10% decrease"], answer: 2, hint: "Formula: Net % change = x + y + (xy / 100). Here, x = +10, y = -10. Result = -1%." },
            { cat: 'math', diff: 'medium', q: "A's salary is 25% more than B's. By what percentage is B's salary less than A's?", options: ["20%", "25%", "16.66%", "30%"], answer: 0, hint: "Formula: Required % = [R / (100 + R)] × 100. [25 / 125] × 100 = 20%." },
            { cat: 'math', diff: 'medium', q: "Find the simple interest on ₹5,000 at a rate of 8% per annum for 3 years.", options: ["₹1,000", "₹1,200", "₹1,500", "₹1,800"], answer: 1, hint: "Formula: Simple Interest (SI) = (Principal × Rate × Time) / 100." },
            { cat: 'math', diff: 'medium', q: "If A : B = 3 : 4 and B : C = 8 : 9, find A : B : C.", options: ["3 : 4 : 9", "6 : 8 : 9", "8 : 9 : 12", "3 : 8 : 9"], answer: 1, hint: "Concept Rule: Make the common term (B) equal in both ratios by multiplying A:B by 2." },
            { cat: 'math', diff: 'medium', q: "₹1,200 is divided between A and B in the ratio 5 : 7. What is B's share?", options: ["₹500", "₹600", "₹700", "₹800"], answer: 2, hint: "Formula: Share of B = (Ratio of B / Total Ratio) × Total Amount. (7/12) × 1200." },
            { cat: 'math', diff: 'medium', q: "The present ages of A and B are in the ratio 4:5. After 5 years, the ratio will be 5:6. What is A's present age?", options: ["16", "20", "24", "25"], answer: 1, hint: "Formula: (4x + 5) / (5x + 5) = 5/6. Cross multiply to find x = 5. A's age = 4x = 20." },
            { cat: 'math', diff: 'medium', q: "If A can complete a work in 10 days and B can complete the same work in 15 days, how long will A and B take together?", options: ["5 days", "6 days", "8 days", "12 days"], answer: 1, hint: "Formula: Time taken together = (xy) / (x + y). (10 × 15) / (25) = 6." },
            { cat: 'math', diff: 'medium', q: "A and B can do a piece of work in 12 days. A alone can do it in 20 days. How many days will B take alone?", options: ["15 days", "24 days", "30 days", "40 days"], answer: 2, hint: "Formula: B's 1-day work = (A+B)'s 1-day work - A's 1-day work. (1/12) - (1/20) = 1/30." },
            { cat: 'math', diff: 'medium', q: "15 men can build a wall in 20 days. How many men are required to build the same wall in 12 days?", options: ["20", "25", "30", "35"], answer: 1, hint: "Formula: M1 × D1 = M2 × D2. 15 × 20 = M2 × 12. M2 = 25." },
            { cat: 'math', diff: 'medium', q: "Pipe A fills a tank in 10 hours and Pipe B empties it in 15 hours. If both open simultaneously, when will it be full?", options: ["20 hours", "25 hours", "30 hours", "12 hours"], answer: 2, hint: "Formula: Net work done in 1 hour = (1/10) - (1/15) = 1/30. So, 30 hours." },
            { cat: 'math', diff: 'medium', q: "Two trains 100m and 150m long cross each other in 10 seconds traveling in opposite directions. Find relative speed.", options: ["15 m/s", "20 m/s", "25 m/s", "30 m/s"], answer: 2, hint: "Formula: Relative Speed = (Total Length) / Time. (100 + 150) / 10 = 25 m/s." },
            { cat: 'math', diff: 'medium', q: "A boat travels downstream at 14 km/hr and upstream at 10 km/hr. Speed of the boat in still water?", options: ["2 km/hr", "4 km/hr", "12 km/hr", "24 km/hr"], answer: 2, hint: "Formula: Speed in still water = 1/2 × (Downstream + Upstream). 1/2 × (14 + 10) = 12." },
            { cat: 'math', diff: 'medium', q: "A person covers half his journey at 40 km/hr and the other half at 60 km/hr. What is his average speed?", options: ["48 km/hr", "50 km/hr", "52 km/hr", "45 km/hr"], answer: 0, hint: "Formula: Average Speed for equal distances = (2xy) / (x + y). (2 × 40 × 60) / 100 = 48." },
            { cat: 'math', diff: 'medium', q: "A sum doubles itself in 5 years at simple interest. What is the rate of interest?", options: ["15%", "20%", "25%", "10%"], answer: 1, hint: "Formula: R = [(N - 1) × 100] / T, where N is times multiplied. [(2-1)×100]/5 = 20%." },
            { cat: 'math', diff: 'medium', q: "A shopkeeper sells an article for ₹720, suffering a loss of 10%. What is the cost price?", options: ["₹792", "₹800", "₹810", "₹850"], answer: 1, hint: "Formula: CP = (SP × 100) / (100 - Loss %). (720 × 100) / 90 = 800." },
            { cat: 'math', diff: 'medium', q: "Find the compound interest on ₹10,000 for 2 years at 10% per annum.", options: ["₹2,000", "₹2,100", "₹2,200", "₹2,500"], answer: 1, hint: "Formula: Amount = P(1 + R/100)^T. CI = Amount - P. 10000(1.1)^2 = 12100. CI = 2100." },
            { cat: 'math', diff: 'medium', q: "A bag contains 50p, 25p, and 10p coins in ratio 5:9:4, amounting to ₹206. Find the number of 50p coins.", options: ["100", "150", "200", "250"], answer: 2, hint: "Equation: 5x(0.50) + 9x(0.25) + 4x(0.10) = 206 => 5.15x = 206 => x = 40. 50p coins = 5×40 = 200." },
            { cat: 'math', diff: 'medium', q: "A is twice as good a workman as B and together they finish a piece of work in 14 days. Days for A alone?", options: ["21", "28", "42", "18"], answer: 0, hint: "Efficiency A:B = 2:1. Total = 3 units/day. Total work = 3 × 14 = 42. A's time = 42/2 = 21." },
            { cat: 'math', diff: 'medium', q: "A man walking at 3/4 of his usual speed reaches his office 20 minutes late. Find his usual time.", options: ["40 mins", "60 mins", "80 mins", "45 mins"], answer: 1, hint: "Rule: Time & Speed are inversely proportional. T / (3/4) = T + 20 => 4T/3 - T = 20 => T = 60." },

            // ================= MATH: HARD (20 Questions) =================
            { cat: 'math', diff: 'hard', q: "A dishonest dealer professes to sell at CP, but uses a false weight of 900g for 1 kg. Profit percentage?", options: ["10%", "11.11%", "9%", "12.5%"], answer: 1, hint: "Formula: Profit % = (Error / True Value - Error) × 100. (100 / 900) × 100 = 11.11%." },
            { cat: 'math', diff: 'hard', q: "The difference between CI and SI on a sum for 2 years at 5% per annum is ₹25. Find the sum.", options: ["₹5,000", "₹8,000", "₹10,000", "₹12,000"], answer: 2, hint: "Formula: Difference for 2 years = P × (R/100)². 25 = P × (25/10000) => P = 10,000." },
            { cat: 'math', diff: 'hard', q: "A container contains 40 liters of milk. 4 liters are drawn and replaced by water. This is repeated twice more. Milk left?", options: ["29.16 L", "28.5 L", "30 L", "32.4 L"], answer: 0, hint: "Formula: Final Amount = Initial × (1 - replacement/total)^n. 40 × (1 - 4/40)^3 = 29.16." },
            { cat: 'math', diff: 'hard', q: "In how many ways can the letters of the word 'APPLE' be arranged?", options: ["120", "60", "24", "48"], answer: 1, hint: "Formula: n! / (p!q!). 5 letters, 'P' repeats twice. 5! / 2! = 120 / 2 = 60." },
            { cat: 'math', diff: 'hard', q: "A box contains 5 red, 4 blue, and 3 green balls. If 2 balls are drawn at random, probability they are red?", options: ["5/33", "5/12", "1/6", "10/33"], answer: 0, hint: "Probability = Favorable Outcomes / Total Outcomes. C(5,2) / C(12,2) = 10 / 66 = 5/33." },
            { cat: 'math', diff: 'hard', q: "Two trains running in the same direction at 40 km/hr and 22 km/hr cross each other. Fast train completely passes a man in the slower train in 5s. Length of fast train?", options: ["20m", "25m", "30m", "50m"], answer: 1, hint: "Relative speed = 40 - 22 = 18 km/hr = 5 m/s. Length = Speed × Time = 5 × 5 = 25m." },
            { cat: 'math', diff: 'hard', q: "A, B, C start a business. A invests 3 times as much as B, and B invests 2/3 of what C invests. Ratio of capitals?", options: ["6:2:3", "3:1:2", "6:3:2", "2:3:6"], answer: 0, hint: "Assume C=3x. B=2x. A = 3(2x) = 6x. Ratio A:B:C = 6x:2x:3x = 6:2:3." },
            { cat: 'math', diff: 'hard', q: "If x + 1/x = 4, find the value of x² + 1/x².", options: ["16", "14", "18", "12"], answer: 1, hint: "Formula: (x + 1/x)² = x² + 1/x² + 2. So, 4² = x² + 1/x² + 2 => 16 - 2 = 14." },
            { cat: 'math', diff: 'hard', q: "A sum of money invested at CI amounts to ₹800 in 3 years and to ₹840 in 4 years. The rate of interest is:", options: ["2.5%", "4%", "5%", "6.66%"], answer: 2, hint: "SI on ₹800 for 1 year = ₹40. Rate = (40 / 800) × 100 = 5%." },
            { cat: 'math', diff: 'hard', q: "A clock is set right at 5 AM. It loses 16 minutes in 24 hours. What will be the true time when the clock indicates 10 PM on 4th day?", options: ["11 PM", "10:30 PM", "11:30 PM", "12 AM"], answer: 0, hint: "Time from 5 AM 1st day to 10 PM 4th day = 89 hrs. 23 hrs 44 min of this clock = 24 hrs correct. True time = 90 hrs from 5AM = 11 PM." },
            { cat: 'math', diff: 'hard', q: "What is the unit digit in the product (3^65 × 6^59 × 7^71)?", options: ["1", "2", "4", "6"], answer: 2, hint: "Unit digits cyclicity: 3^65 -> 3, 6^59 -> 6, 7^71 -> 3. 3 × 6 × 3 = 54. Unit digit is 4." },
            { cat: 'math', diff: 'hard', q: "Find the greatest number that will divide 43, 91 and 183 so as to leave the same remainder in each case.", options: ["4", "7", "9", "13"], answer: 0, hint: "Find HCF of differences: |91-43|, |183-91|, |183-43| => HCF of 48, 92, 140 is 4." },
            { cat: 'math', diff: 'hard', q: "Two pipes A and B can fill a tank in 15 and 20 min respectively. Both are opened, but after 4 min A is turned off. Total time to fill?", options: ["10 min 40 sec", "11 min 45 sec", "14 min 40 sec", "12 min"], answer: 2, hint: "Part filled in 4 min = 4(1/15 + 1/20) = 4(7/60) = 7/15. Remaining = 8/15. Time by B = (8/15) × 20 = 32/3 = 10m 40s. Total = 14m 40s." },
            { cat: 'math', diff: 'hard', q: "A rectangular park 60m x 40m has two concrete crossroads running in the middle, width 5m. Area of the roads?", options: ["475 m²", "500 m²", "525 m²", "450 m²"], answer: 0, hint: "Area = Area of vertical + Area of horizontal - Area of intersection = (60×5) + (40×5) - (5×5) = 300 + 200 - 25 = 475." },
            { cat: 'math', diff: 'hard', q: "How many liters of pure acid are there in 8 liters of a 20% solution?", options: ["1.4", "1.5", "1.6", "2.0"], answer: 2, hint: "20% of 8 = 0.20 × 8 = 1.6 liters." },
            { cat: 'math', diff: 'hard', q: "A merchant blends 2 varieties of tea costing ₹15/kg and ₹20/kg in ratio 2:3. He sells blend at ₹22/kg. Profit %?", options: ["20%", "22.2%", "25%", "28%"], answer: 1, hint: "CP = (2×15 + 3×20)/5 = 90/5 = ₹18/kg. SP = ₹22/kg. Profit% = (4/18)×100 = 22.22%." },
            { cat: 'math', diff: 'hard', q: "The probability that A speaks truth is 4/5, B is 3/4. Probability they contradict each other?", options: ["1/2", "7/20", "3/5", "2/5"], answer: 1, hint: "P(Contradict) = P(A truth)P(B false) + P(A false)P(B truth) = (4/5×1/4) + (1/5×3/4) = 4/20 + 3/20 = 7/20." },
            { cat: 'math', diff: 'hard', q: "Three numbers are in ratio 3:4:5 and their LCM is 2400. Their HCF is:", options: ["40", "80", "120", "200"], answer: 0, hint: "Let numbers be 3x, 4x, 5x. LCM = 60x = 2400 => x = 40. x is the HCF." },
            { cat: 'math', diff: 'hard', q: "A boat covers 24km upstream and 36km downstream in 6 hours. Covers 36km up and 24km down in 6.5 hours. Current speed?", options: ["1 km/hr", "1.5 km/hr", "2 km/hr", "2.5 km/hr"], answer: 2, hint: "Let 1/up = u, 1/down = d. 24u + 36d = 6; 36u + 24d = 6.5. Solving gives Up=8, Down=12. Current = (12-8)/2 = 2 km/hr." },
            { cat: 'math', diff: 'hard', q: "A regular hexagon is inscribed in a circle of radius 5 cm. What is the area of the hexagon?", options: ["37.5√3 cm²", "75√3 cm²", "50√3 cm²", "100 cm²"], answer: 0, hint: "A regular hexagon is 6 equilateral triangles. Side = Radius = 5. Area = 6 × (√3/4) × 5² = 37.5√3." },

            // ================= MATH: EXTREME (40 Questions) =================
            { cat: 'math', diff: 'extreme', q: "A watch gains 5 seconds in 3 minutes and was set right at 8 AM. What time will it show at 10 PM on the same day?", options: ["10:23:20 PM", "10:14:00 PM", "10:25:00 PM", "10:15:20 PM"], answer: 0, hint: "14 hours = 840 mins. Gains 5s per 3 mins = (840/3)*5 = 1400s = 23 mins 20 secs. Time is 10:23:20 PM." },
            { cat: 'math', diff: 'extreme', q: "What is the probability that a leap year selected at random will contain 53 Sundays?", options: ["1/7", "2/7", "3/7", "5/14"], answer: 1, hint: "A leap year has 366 days = 52 weeks + 2 days. The 2 extra days can be (Sun,Mon), (Sat,Sun), etc. Total 7 pairs, 2 contain Sunday." },
            { cat: 'math', diff: 'extreme', q: "A can do a piece of work in 10 days, B in 15 days. They work for 5 days. The rest of the work was finished by C in 2 days. If they get ₹1500 for the whole work, what is C's share?", options: ["₹250", "₹300", "₹500", "₹450"], answer: 0, hint: "A's 5 days = 5/10=1/2. B's 5 days = 5/15=1/3. Total = 5/6. C did 1/6 of work, so C gets 1/6 of ₹1500 = ₹250." },
            { cat: 'math', diff: 'extreme', q: "Two pipes can fill a cistern in 14 hours and 16 hours. The pipes are opened simultaneously and it is found that due to leakage in the bottom it took 32 minutes more to fill. When the cistern is full, in what time will the leak empty it?", options: ["112 hours", "114.5 hours", "116.8 hours", "120 hours"], answer: 0, hint: "Work without leak = (14*16)/(30) = 112/15 hrs = 7 hrs 28 min. With leak = 8 hrs. Net work = 1/14 + 1/16 - 1/L = 1/8. Solving L = 112 hrs." },
            { cat: 'math', diff: 'extreme', q: "Find the remainder when 2^256 is divided by 17.", options: ["1", "2", "15", "16"], answer: 0, hint: "Fermat's Little Theorem: a^(p-1) mod p = 1. Here p=17. 2^16 mod 17 = 1. 256 is a multiple of 16 (16*16). So remainder is 1." },
            { cat: 'math', diff: 'extreme', q: "A sphere of radius 3 cm is dropped into a cylindrical vessel of radius 4 cm containing water. The rise in water level is:", options: ["4/9 cm", "9/4 cm", "9/16 cm", "3/4 cm"], answer: 1, hint: "Volume of sphere = Volume of displaced cylinder. (4/3)π(3^3) = π(4^2)h => 36 = 16h => h = 36/16 = 9/4 cm." },
            { cat: 'math', diff: 'extreme', q: "In a 100m race, A beats B by 10m and C by 13m. In a race of 180m, B will beat C by:", options: ["6m", "8m", "10m", "12m"], answer: 0, hint: "When A runs 100m, B runs 90m, C runs 87m. Ratio of B:C is 90:87. For 180m for B, C will run (87/90)*180 = 174m. B beats C by 6m." },
            { cat: 'math', diff: 'extreme', q: "A man can row 6 km/h in still water. It takes him twice as long to row up as to row down the river. Rate of stream?", options: ["1.5 km/h", "2 km/h", "2.5 km/h", "3 km/h"], answer: 1, hint: "Distance is same. (6-v)*2t = (6+v)*t => 12 - 2v = 6 + v => 3v = 6 => v = 2 km/h." },
            { cat: 'math', diff: 'extreme', q: "What is the angle between the hands of a clock at 3:40?", options: ["120°", "125°", "130°", "140°"], answer: 2, hint: "Angle = |30H - 5.5M|. Angle = |30(3) - 5.5(40)| = |90 - 220| = 130°." },
            { cat: 'math', diff: 'extreme', q: "If log 2 = 0.3010 and log 3 = 0.4771, find the value of log 512.", options: ["2.709", "2.812", "2.903", "3.010"], answer: 0, hint: "512 = 2^9. log(512) = 9*log(2) = 9 * 0.3010 = 2.709." },
            { cat: 'math', diff: 'extreme', q: "What is the number of zeroes at the end of 100! ?", options: ["21", "22", "23", "24"], answer: 3, hint: "Zeroes depend on pairs of 5s and 2s. Number of 5s = [100/5] + [100/25] = 20 + 4 = 24." },
            { cat: 'math', diff: 'extreme', q: "A, B and C can do a work in 20, 30 and 60 days. A works all days. B and C help A on every third day. How many days to finish?", options: ["12", "15", "18", "21"], answer: 1, hint: "A's work in 3 days = 3/20. B+C work in 1 day = 1/30 + 1/60 = 1/20. Work in 3 days = 4/20 = 1/5. Total days = 5*3 = 15." },
            { cat: 'math', diff: 'extreme', q: "A merchant decides to sell his goods at 10% loss but uses a false weight of 800g instead of 1kg. Net profit/loss %?", options: ["10% Profit", "12.5% Profit", "15% Profit", "12.5% Loss"], answer: 1, hint: "Selling 800g (worth ₹80) for ₹90 (10% loss on 1kg=₹100). Profit = ₹10 on cost of ₹80. 10/80 = 12.5% profit." },
            { cat: 'math', diff: 'extreme', q: "Find the sum of all 3 digit numbers divisible by 5.", options: ["98550", "98100", "98950", "99000"], answer: 0, hint: "AP: 100, 105... 995. Total terms (n) = (995-100)/5 + 1 = 180. Sum = (180/2)*(100 + 995) = 90 * 1095 = 98550." },
            { cat: 'math', diff: 'extreme', q: "If the difference between CI and SI on a sum for 3 years at 10% per annum is ₹31, find the sum.", options: ["₹1,000", "₹1,200", "₹1,500", "₹2,000"], answer: 0, hint: "Diff = P(R/100)²(3 + R/100). 31 = P(1/10)²(3 + 1/10) => 31 = P(1/100)(31/10) => P = 1000." },
            { cat: 'math', diff: 'extreme', q: "From a pack of 52 cards, 2 cards are drawn together. Probability both are kings?", options: ["1/221", "2/221", "3/221", "4/221"], answer: 0, hint: "C(4,2) / C(52,2) = 6 / 1326 = 1 / 221." },
            { cat: 'math', diff: 'extreme', q: "The roots of the equation x² - 5x + 6 = 0 are:", options: ["2, -3", "-2, 3", "2, 3", "-2, -3"], answer: 2, hint: "Factorizing gives (x-2)(x-3)=0. Roots are 2 and 3." },
            { cat: 'math', diff: 'extreme', q: "Two poles of height 6m and 11m stand on plane ground. If distance between their feet is 12m, distance between tops?", options: ["13m", "14m", "15m", "16m"], answer: 0, hint: "Right triangle formed: base = 12, height difference = 11 - 6 = 5. Hypotenuse = √(12² + 5²) = 13." },
            { cat: 'math', diff: 'extreme', q: "What is the HCF of 2/3, 4/5, and 6/7?", options: ["2/105", "12/105", "2/35", "12/35"], answer: 0, hint: "HCF of fractions = HCF of numerators / LCM of denominators. HCF(2,4,6) = 2. LCM(3,5,7) = 105. Result: 2/105." },
            { cat: 'math', diff: 'extreme', q: "A solution of 10% acid is mixed with a solution of 30% acid to get 50 liters of 22% acid. How much of 10% acid was used?", options: ["15L", "20L", "25L", "30L"], answer: 1, hint: "Alligation: Ratio = (30-22):(22-10) = 8:12 = 2:3. Amount of 10% = (2/5) * 50 = 20 liters." },
            { cat: 'math', diff: 'extreme', q: "If a^x = b, b^y = c, and c^z = a, then the value of xyz is:", options: ["0", "1", "abc", "a+b+c"], answer: 1, hint: "Take log: x = log_a(b), y = log_b(c), z = log_c(a). xyz = log_a(b)*log_b(c)*log_c(a) = log_a(a) = 1." },
            { cat: 'math', diff: 'extreme', q: "Find the total number of factors of 120.", options: ["12", "14", "16", "18"], answer: 2, hint: "120 = 2³ × 3¹ × 5¹. Number of factors = (3+1)(1+1)(1+1) = 4 × 2 × 2 = 16." },
            { cat: 'math', diff: 'extreme', q: "If A+B = 90°, what is the maximum value of sin(A)sin(B)?", options: ["1/2", "1", "√3/2", "1/4"], answer: 0, hint: "sin(A)sin(90-A) = sin(A)cos(A) = 0.5 * sin(2A). Max value occurs when 2A=90 (A=45). 0.5 * sin(90) = 1/2." },
            { cat: 'math', diff: 'extreme', q: "A train starts with the speed of 70 km/h with its speed increasing every 2 hours by 10 km/h. Hours to cover 345 km?", options: ["3", "3.5", "4", "4.5"], answer: 3, hint: "1st 2 hrs: 140km. Next 2 hrs (at 80km/h): 160km. Total 4 hrs = 300km. Remaining 45km at 90km/h takes 0.5 hrs. Total 4.5 hrs." },
            { cat: 'math', diff: 'extreme', q: "There are 5 letters and 5 addressed envelopes. Probability that exactly 1 letter is put in a wrong envelope?", options: ["0", "1/5", "1/120", "1/24"], answer: 0, hint: "It is impossible for exactly ONE letter to be in the wrong envelope. If one is wrong, its proper spot is taken, forcing at least one more to be wrong." },
            { cat: 'math', diff: 'extreme', q: "A circular track has a length of 600m. A and B start in opposite directions at 15 m/s and 10 m/s. When will they first meet?", options: ["20s", "24s", "30s", "40s"], answer: 1, hint: "Relative speed = 15 + 10 = 25 m/s. Time to meet = Distance / Rel Speed = 600 / 25 = 24 seconds." },
            { cat: 'math', diff: 'extreme', q: "Evaluate: (1 - 1/3)(1 - 1/4)(1 - 1/5)...(1 - 1/n)", options: ["1/n", "2/n", "2/(n-1)", "n/2"], answer: 1, hint: "Series expands to: (2/3) * (3/4) * (4/5) * ... * (n-1)/n. All intermediate terms cancel out, leaving 2/n." },
            { cat: 'math', diff: 'extreme', q: "The ratio of the volume of a cube to that of a sphere which exactly fits inside the cube is:", options: ["6:π", "π:6", "4:π", "8:π"], answer: 0, hint: "Let sphere radius=r, so cube side=2r. Cube Vol=(2r)³=8r³. Sphere Vol=(4/3)πr³. Ratio = 8r³ : (4/3)πr³ = 24:4π = 6:π." },
            { cat: 'math', diff: 'extreme', q: "The angle of elevation of a ladder leaning against a wall is 60°. Foot of ladder is 4.6m away. Length of ladder?", options: ["2.3m", "4.6m", "9.2m", "10m"], answer: 2, hint: "cos(60°) = Base / Hypotenuse => 1/2 = 4.6 / Length => Length = 4.6 * 2 = 9.2m." },
            { cat: 'math', diff: 'extreme', q: "How many 3-digit numbers can be formed using 1,2,3,4,5 if repetition is not allowed?", options: ["60", "120", "25", "125"], answer: 0, hint: "Permutations: 5 choices for 1st, 4 for 2nd, 3 for 3rd. 5 * 4 * 3 = 60." },
            { cat: 'math', diff: 'extreme', q: "In a group of 50 students, 30 like Tea, 25 like Coffee, 10 like neither. How many like both?", options: ["10", "12", "15", "5"], answer: 2, hint: "Total liking at least one = 50 - 10 = 40. n(T U C) = n(T) + n(C) - n(T ∩ C) => 40 = 30 + 25 - Both => Both = 55 - 40 = 15." },
            { cat: 'math', diff: 'extreme', q: "The L.C.M. of two numbers is 48. The numbers are in ratio 2:3. The sum of the numbers is:", options: ["28", "32", "40", "64"], answer: 2, hint: "Numbers are 2x and 3x. LCM = 6x = 48 => x = 8. Numbers are 16 and 24. Sum = 40." },
            { cat: 'math', diff: 'extreme', q: "If selling price is doubled, the profit triples. Find the profit percentage.", options: ["66.6%", "100%", "105.3%", "120%"], answer: 1, hint: "Original profit P = SP - CP. New profit 3P = 2SP - CP. Substituting: 3(SP - CP) = 2SP - CP => 3SP - 3CP = 2SP - CP => SP = 2CP. Profit = CP, so 100%." },
            { cat: 'math', diff: 'extreme', q: "A polygon has 54 diagonals. The number of sides in the polygon is:", options: ["10", "11", "12", "13"], answer: 2, hint: "Formula: n(n-3)/2 = 54 => n² - 3n - 108 = 0. Solving: (n-12)(n+9) = 0 => n = 12." },
            { cat: 'math', diff: 'extreme', q: "In what ratio must water be mixed with milk costing ₹12 per liter to obtain a mixture worth ₹8 per liter?", options: ["1:2", "2:1", "2:3", "3:2"], answer: 0, hint: "Alligation: Water (0) and Milk (12) mixed for (8). Ratio of W:M = (12-8):(8-0) = 4:8 = 1:2." },
            { cat: 'math', diff: 'extreme', q: "Evaluate log_2 (log_2 (log_3 81))", options: ["0", "1", "2", "3"], answer: 1, hint: "log_3(81) = 4. log_2(4) = 2. log_2(2) = 1." },
            { cat: 'math', diff: 'extreme', q: "A can contains a mixture of two liquids A and B in ratio 7:5. When 9 liters are drawn and replaced by B, ratio is 7:9. Initial liquid A?", options: ["10L", "20L", "21L", "25L"], answer: 2, hint: "Let initial A=7x, B=5x. After 9L drawn: A = 7x - (7/12)9. Ratio = (7x - 21/4) / (5x - 15/4 + 9) = 7/9. Solving gives x=3. Initial A = 21." },
            { cat: 'math', diff: 'extreme', q: "What day of the week was 15th August 1947?", options: ["Thursday", "Friday", "Saturday", "Sunday"], answer: 1, hint: "Calendar logic: 1946 years = 1 odd day. Jan to Aug 15 = 227 days = 3 odd days. 1+3 = 4 odd days (Friday)." },
            { cat: 'math', diff: 'extreme', q: "If 3^(x-y) = 27 and 3^(x+y) = 243, then x is equal to:", options: ["0", "2", "4", "6"], answer: 2, hint: "3^(x-y) = 3^3 => x-y = 3. 3^(x+y) = 3^5 => x+y = 5. Adding: 2x = 8 => x = 4." },
            { cat: 'math', diff: 'extreme', q: "The sum of ages of 5 children born at intervals of 3 years each is 50 years. Age of the youngest?", options: ["4", "5", "8", "10"], answer: 0, hint: "x + (x+3) + (x+6) + (x+9) + (x+12) = 50 => 5x + 30 = 50 => 5x = 20 => x = 4." },

            // ================= GRAMMAR: EASY (20 Questions) =================
            { cat: 'grammar', diff: 'easy', q: "Identify the error: “He go to office daily.”", options: ["He", "go to", "office", "daily"], answer: 1, hint: "Grammar Rule: Subject-Verb Agreement. Third-person singular subjects (He, She, It) require a singular verb ending in -s or -es (goes)." },
            { cat: 'grammar', diff: 'easy', q: "Fill in the blank: 'I ___ a student.'", options: ["am", "is", "are", "be"], answer: 0, hint: "The pronoun 'I' always pairs with the 'to be' verb 'am' in the present tense." },
            { cat: 'grammar', diff: 'easy', q: "Choose the correct spelling:", options: ["Definately", "Definetly", "Definitely", "Definitly"], answer: 2, hint: "Spelling Rule: Remember the root word 'finite'. De-finite-ly." },
            { cat: 'grammar', diff: 'easy', q: "Choose the synonym for 'Happy'.", options: ["Sad", "Joyful", "Angry", "Tired"], answer: 1, hint: "Synonyms have similar meanings. 'Joyful' is a state of happiness." },
            { cat: 'grammar', diff: 'easy', q: "Choose the antonym for 'Hot'.", options: ["Warm", "Boiling", "Cold", "Spicy"], answer: 2, hint: "Antonyms are opposites. The opposite of hot is cold." },
            { cat: 'grammar', diff: 'easy', q: "Identify the article in the sentence: 'She bought an apple.'", options: ["She", "bought", "an", "apple"], answer: 2, hint: "Articles are 'a', 'an', and 'the'." },
            { cat: 'grammar', diff: 'easy', q: "Fill in the blank: 'The cat is sitting ___ the mat.'", options: ["on", "in", "at", "underneath of"], answer: 0, hint: "Prepositions of place. 'On' indicates surface placement." },
            { cat: 'grammar', diff: 'easy', q: "Which word is a noun?", options: ["Run", "Quickly", "Beautiful", "Table"], answer: 3, hint: "A noun is a person, place, thing, or idea. 'Table' is a thing." },
            { cat: 'grammar', diff: 'easy', q: "Change to past tense: 'He walks to school.'", options: ["He walking to school.", "He walk to school.", "He walked to school.", "He will walk to school."], answer: 2, hint: "Regular past tense verbs end in '-ed'." },
            { cat: 'grammar', diff: 'easy', q: "Identify the error: 'I doesn't like apples.'", options: ["I", "doesn't", "like", "apples"], answer: 1, hint: "Subject-verb agreement. The pronoun 'I' takes 'do not' (don't), not 'does not'." },
            { cat: 'grammar', diff: 'easy', q: "Fill in the blank: 'She plays the piano very ___.'", options: ["good", "well", "nice", "beautiful"], answer: 1, hint: "Adverbs modify verbs. 'Well' is the adverb form of 'good'." },
            { cat: 'grammar', diff: 'easy', q: "What is the plural of 'Child'?", options: ["Childs", "Childrens", "Children", "Childes"], answer: 2, hint: "Irregular plurals. The plural of child is children." },
            { cat: 'grammar', diff: 'easy', q: "Choose the correct form: 'They ___ going to the park.'", options: ["am", "is", "are", "be"], answer: 2, hint: "Plural subject 'They' takes the plural verb 'are'." },
            { cat: 'grammar', diff: 'easy', q: "Which sentence is punctuated correctly?", options: ["Its my birthday.", "It's my birthday.", "Its' my birthday.", "It is my, birthday."], answer: 1, hint: "'It's' is a contraction for 'It is'." },
            { cat: 'grammar', diff: 'easy', q: "Choose the synonym for 'Fast'.", options: ["Slow", "Sluggish", "Quick", "Heavy"], answer: 2, hint: "Synonyms are similar. Fast = Quick." },
            { cat: 'grammar', diff: 'easy', q: "Identify the pronoun: 'We love playing chess.'", options: ["We", "love", "playing", "chess"], answer: 0, hint: "Pronouns replace nouns (I, you, he, she, we, they)." },
            { cat: 'grammar', diff: 'easy', q: "Fill in the blank: 'I have ___ brother.'", options: ["a", "an", "the", "some"], answer: 0, hint: "Use 'a' before consonant sounds." },
            { cat: 'grammar', diff: 'easy', q: "What is the opposite of 'Begin'?", options: ["Start", "Commence", "Finish", "Open"], answer: 2, hint: "Antonym for starting is finishing." },
            { cat: 'grammar', diff: 'easy', q: "Find the misspelled word:", options: ["Believe", "Recieve", "Achieve", "Relieve"], answer: 1, hint: "Rule: 'i' before 'e' except after 'c'. It should be 'Receive'." },
            { cat: 'grammar', diff: 'easy', q: "Fill in the blank: 'She is looking ___ her lost keys.'", options: ["at", "for", "to", "in"], answer: 1, hint: "Phrasal verb: 'look for' means to search." },

            // ================= GRAMMAR: MEDIUM (20 Questions) =================
            { cat: 'grammar', diff: 'medium', q: "Identify the error: “One of the boy is missing from the class.”", options: ["One of the", "boy is", "missing from", "the class"], answer: 1, hint: "Grammar Rule: 'One of the...' must be followed by a plural noun (boys) and a singular verb (is)." },
            { cat: 'grammar', diff: 'medium', q: "Identify the error: “I have been living in this city since five years.”", options: ["I have been", "living in this city", "since", "five years"], answer: 2, hint: "Grammar Rule: Use 'for' for a duration (for five years). Use 'since' for a starting point (since 2018)." },
            { cat: 'grammar', diff: 'medium', q: "Identify the error: “She is more smarter than her elder brother.”", options: ["She is", "more smarter", "than her", "elder brother"], answer: 1, hint: "Grammar Rule: Double comparatives are incorrect. Remove 'more'." },
            { cat: 'grammar', diff: 'medium', q: "Sentence Correction: 'Hardly had I left the house then it started raining.'", options: ["than it started", "when it started", "that it started", "No correction required"], answer: 1, hint: "Grammar Rule: 'Hardly' or 'Scarcely' is always followed by 'when'." },
            { cat: 'grammar', diff: 'medium', q: "Sentence Correction: 'Despite of his hard work, he failed the exam.'", options: ["In spite his hard work", "Despite his hard work", "Although of his hard work", "No correction required"], answer: 1, hint: "Grammar Rule: 'Despite' is never followed by 'of'. (Use Despite or In spite of)." },
            { cat: 'grammar', diff: 'medium', q: "Fill in the blank: 'She is very good ___ Mathematics.'", options: ["in", "with", "at", "about"], answer: 2, hint: "Grammar Rule: Collocation. The adjective 'good' (skills) takes the preposition 'at'." },
            { cat: 'grammar', diff: 'medium', q: "Fill in the blank: 'He was accused ___ stealing the company\\'s data.'", options: ["for", "of", "with", "about"], answer: 1, hint: "Grammar Rule: Fixed Prepositions. 'Accused' is always followed by 'of'." },
            { cat: 'grammar', diff: 'medium', q: "Fill in the blank: '___ you work hard, you will not pass the aptitude round.'", options: ["If", "Unless", "Until", "Although"], answer: 1, hint: "Grammar Rule: 'Unless' provides a negative condition necessary for the outcome (if not)." },
            { cat: 'grammar', diff: 'medium', q: "Fill in the blank: 'The manager, along with his team members, ___ attending the conference.'", options: ["are", "is", "have", "were"], answer: 1, hint: "Grammar Rule: Phrases like 'along with' do not make a singular subject plural. Primary subject is singular." },
            { cat: 'grammar', diff: 'medium', q: "Choose the correct synonym of “Rapid”", options: ["Sluggish", "Swift", "Tedious", "Leisurely"], answer: 1, hint: "Vocabulary Rule: 'Rapid' means moving with great speed. Swift is the closest match." },
            { cat: 'grammar', diff: 'medium', q: "Choose the correct synonym of “Mitigate”", options: ["Aggravate", "Alleviate", "Intensify", "Provoke"], answer: 1, hint: "Vocabulary Rule: To 'mitigate' means to make less severe. 'Alleviate' is the closest match." },
            { cat: 'grammar', diff: 'medium', q: "Choose the correct antonym of “Obscure”", options: ["Hidden", "Vague", "Obvious", "Confusing"], answer: 2, hint: "Vocabulary Rule: 'Obscure' means not clear. The opposite is 'Obvious'." },
            { cat: 'grammar', diff: 'medium', q: "Choose the correct antonym of “Diligent”", options: ["Hardworking", "Assiduous", "Lazy", "Careful"], answer: 2, hint: "Vocabulary Rule: 'Diligent' means showing steady care. The opposite is 'Lazy'." },
            { cat: 'grammar', diff: 'medium', q: "Choose the correct spelling:", options: ["Accomodation", "Accommodation", "Acommodation", "Acomodation"], answer: 1, hint: "Spelling Rule: Remember the double letters. Two C's and two M's." },
            { cat: 'grammar', diff: 'medium', q: "Choose the correct spelling:", options: ["Embarassment", "Embarrasment", "Embarrassment", "Embaressment"], answer: 2, hint: "Spelling Rule: Remember the double letters. Two R's and two S's." },
            { cat: 'grammar', diff: 'medium', q: "What is the meaning of the idiom: 'Bite the bullet'?", options: ["To physically injure oneself", "To face a difficult situation bravely", "To talk aggressively", "To avoid a problem"], answer: 1, hint: "Idiom Origin: Historically biting on a bullet during surgery without anesthesia." },
            { cat: 'grammar', diff: 'medium', q: "What is the meaning of the idiom: 'Under the weather'?", options: ["Caught in the rain", "Feeling slightly ill", "Facing heavy criticism", "Being extremely happy"], answer: 1, hint: "Idiom Usage: An expression used when someone is not feeling their usual healthy self." },
            { cat: 'grammar', diff: 'medium', q: "One word substitution: 'A person who knows and is able to use several languages.'", options: ["Introvert", "Polymath", "Polyglot", "Philanthropist"], answer: 2, hint: "Prefix 'Poly-' means many, and 'glot' refers to tongue/language." },
            { passage: "Cloud computing has revolutionized data storage by allowing scalability.", cat: 'grammar', diff: 'medium', q: "What does cloud computing primarily allow?", options: ["Hardware sales", "Scalability", "Physical servers", "Data loss"], answer: 1, hint: "RC Rule: Direct restatement from the text." },
            { cat: 'grammar', diff: 'medium', q: "Fill in the blank: 'I am looking forward to ___ you.'", options: ["meet", "meeting", "met", "have met"], answer: 1, hint: "Grammar Rule: 'Looking forward to' is followed by a gerund (-ing)." },

            // ================= GRAMMAR: HARD (20 Questions) =================
            { cat: 'grammar', diff: 'hard', q: "Rearrange:<br>P. The system processes data.<br>Q. Finally, it displays output.<br>R. First, user inputs parameters.<br>S. Then, it checks errors.", options: ["R, P, S, Q", "P, R, S, Q", "R, S, P, Q", "Q, S, P, R"], answer: 0, hint: "Logic Rule: Sequence markers (First -> Action -> Next step -> Finally)." },
            { cat: 'grammar', diff: 'hard', q: "Rearrange:<br>P. Cloud revolutionized storage.<br>Q. Before this, servers were required.<br>R. Today, scaling is easy.<br>S. This made operations expensive.", options: ["P, R, Q, S", "P, Q, S, R", "Q, S, P, R", "R, P, Q, S"], answer: 1, hint: "Logic Rule: Chronological cause and effect. P(Topic)->Q(Past)->S(Past Consequence)->R(Present)." },
            { cat: 'grammar', diff: 'hard', q: "Identify the error: 'Not only the students but also the teacher were present.'", options: ["Not only", "but also", "the teacher", "were present"], answer: 3, hint: "Grammar Rule: In 'not only... but also', the verb agrees with the subject closest to it (teacher -> was)." },
            { cat: 'grammar', diff: 'hard', q: "Identify the error: 'Scarcely had the train left the station than it started to rain.'", options: ["Scarcely had", "the train left", "than it", "started to rain"], answer: 2, hint: "Grammar Rule: 'Scarcely' pairs with 'when', not 'than'." },
            { cat: 'grammar', diff: 'hard', q: "Synonym of 'Ephemeral'", options: ["Permanent", "Transitory", "Eternal", "Solid"], answer: 1, hint: "Vocabulary: Ephemeral means lasting for a very short time." },
            { cat: 'grammar', diff: 'hard', q: "Antonym of 'Cacophony'", options: ["Noise", "Harmony", "Discord", "Racket"], answer: 1, hint: "Vocabulary: Cacophony means a harsh discordant mixture of sounds." },
            { cat: 'grammar', diff: 'hard', q: "Meaning of idiom: 'Burn the midnight oil'", options: ["To waste resources", "To work late into the night", "To start a fire", "To be destructive"], answer: 1, hint: "Idiom Usage: Refers to working or studying late, originally by the light of an oil lamp." },
            { cat: 'grammar', diff: 'hard', q: "Sentence Correction: 'If I was the Prime Minister, I would change the policies.'", options: ["If I am", "If I were", "If I had been", "No correction"], answer: 1, hint: "Grammar Rule: Subjunctive mood for hypothetical situations uses 'were' for all subjects." },
            { cat: 'grammar', diff: 'hard', q: "Sentence Correction: 'Each of the participants have received a certificate.'", options: ["has received", "are receiving", "were receiving", "No correction"], answer: 0, hint: "Grammar Rule: 'Each of' takes a singular verb." },
            { cat: 'grammar', diff: 'hard', q: "Fill in the blank: 'The novel is so ___ that I couldn't put it down.'", options: ["monotonous", "compelling", "tedious", "bland"], answer: 1, hint: "Context Clues: 'Couldn't put it down' implies it was highly engaging (compelling)." },
            { cat: 'grammar', diff: 'hard', q: "One word substitution: 'A remedy for all diseases.'", options: ["Antibiotic", "Panacea", "Elixir", "Antidote"], answer: 1, hint: "Vocabulary: 'Panacea' derives from the Greek goddess of universal remedy." },
            { cat: 'grammar', diff: 'hard', q: "Choose the correct spelling:", options: ["Consensus", "Concensus", "Conscensus", "Consencus"], answer: 0, hint: "Spelling Rule: It comes from 'consent', ending in 'sensus'." },
            { cat: 'grammar', diff: 'hard', q: "Fill in the blank: 'He is completely ___ to the suffering of others.'", options: ["immune", "callous", "ignorant", "unaware"], answer: 1, hint: "Collocation/Vocab: 'Callous' means showing an insensitive and cruel disregard for others." },
            { passage: "Artificial Intelligence (AI) is transforming the IT industry by automating repetitive tasks, thereby allowing developers to focus on complex problem-solving. However, this shift requires professionals to constantly upskill. While AI handles code generation, human creativity is still paramount in system architecture.", cat: 'grammar', diff: 'hard', q: "According to the passage, what is the primary benefit of AI in the IT industry?", options: ["It replaces architects completely.", "It automates repetitive tasks.", "It prevents upskilling.", "It handles only complex problem-solving."], answer: 1, hint: "RC Rule: Direct restatement from the first sentence." },
            { passage: "Artificial Intelligence (AI) is transforming the IT industry by automating repetitive tasks, thereby allowing developers to focus on complex problem-solving. However, this shift requires professionals to constantly upskill. While AI handles code generation, human creativity is still paramount in system architecture.", cat: 'grammar', diff: 'hard', q: "Based on the passage, what remains a strictly human domain?", options: ["Code generation", "Automating tasks", "Debugging", "System architecture and creativity"], answer: 3, hint: "RC Rule: Locate keywords. Final sentence states 'human creativity is paramount in system architecture'." },
            { cat: 'grammar', diff: 'hard', q: "Identify the error: 'He is one of those people who is always complaining.'", options: ["He is", "one of those", "who is", "always complaining"], answer: 2, hint: "Grammar Rule: 'who' refers to 'people' (plural), so the verb should be plural ('are')." },
            { cat: 'grammar', diff: 'hard', q: "Meaning of idiom: 'To play devil's advocate'", options: ["To do evil", "To argue against a cause just for the sake of argument", "To be a lawyer", "To anger someone intentionally"], answer: 1, hint: "Idiom Usage: Used to test the strength of an opposing argument." },
            { cat: 'grammar', diff: 'hard', q: "Fill in the blank: 'The committee ___ divided on this issue.'", options: ["is", "are", "has", "have"], answer: 1, hint: "Grammar Rule: Collective nouns take a plural verb when members act individually (divided)." },
            { cat: 'grammar', diff: 'hard', q: "Synonym of 'Sycophant'", options: ["Critic", "Flatterer", "Leader", "Rebel"], answer: 1, hint: "Vocabulary: A person who acts obsequiously toward someone important to gain advantage." },
            { cat: 'grammar', diff: 'hard', q: "Antonym of 'Mellifluous'", options: ["Sweet", "Smooth", "Cacophonous", "Harmonious"], answer: 2, hint: "Vocabulary: Mellifluous means sweet-sounding. Cacophonous means harsh-sounding." },

                        <div class="flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-4 pt-6 border-t border-slate-100">
                            <button onclick="toggleHint()" class="text-slate-600 hover:text-amber-700 font-semibold text-sm transition-colors flex items-center justify-center bg-slate-100 hover:bg-amber-100 px-5 py-3 rounded-xl border border-slate-200 hover:border-amber-300 shadow-sm w-full sm:w-auto">
                                <i class="fas fa-lightbulb mr-2 text-amber-500 text-lg"></i> ${showHint ? 'Hide Hint / Formula' : 'Show Hint / Formula'}
                            </button>
                            
                            <div class="flex gap-3 w-full sm:w-auto">
                                <button onclick="prevQuestion()" class="flex-1 sm:flex-none px-5 py-3 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 border border-slate-200 shadow-sm transition-colors ${currentQuestion === 0 ? 'opacity-50 cursor-not-allowed' : ''}" ${currentQuestion === 0 ? 'disabled' : ''}>Back</button>
                                <button onclick="nextQuestion()" class="flex-1 sm:flex-none px-6 py-3 ${currentDifficulty === 'extreme' ? 'bg-purple-600 hover:bg-purple-700 shadow-purple-200' : 'bg-blue-600 hover:bg-blue-700 shadow-blue-200'} text-white rounded-xl font-bold shadow-lg transition-all disabled:opacity-50 disabled:shadow-none disabled:cursor-not-allowed flex items-center justify-center" ${!hasAnswered ? 'disabled' : ''}>
                                    ${currentQuestion === activeQuizData.length - 1 ? 'Finish Set <i class="fas fa-flag-checkered ml-2"></i>' : 'Next <i class="fas fa-arrow-right ml-2"></i>'}
                                </button>
                            </div>
                        </div>

                        ${showHint ? `
                        <div class="mt-6 p-4 sm:p-5 bg-gradient-to-br from-amber-50 to-yellow-50 border border-amber-200 text-amber-900 rounded-2xl text-sm sm:text-base fade-in shadow-inner leading-relaxed">
                            <div class="font-bold flex items-center mb-1 text-amber-800"><i class="fas fa-magic mr-2"></i> Learning Rule:</div>
                            ${q.hint}
                            
                            <div class="mt-4 pt-4 border-t border-amber-200/50 flex flex-wrap gap-3">
                                <div class="w-full">
                                    ${aiExplanation ? `
                                        <div class="bg-white p-4 rounded-xl border border-amber-100 shadow-sm mb-3">
                                            <div class="font-bold text-indigo-600 mb-2 flex items-center"><i class="fas fa-robot mr-2"></i> AI Tutor Explanation:</div>
                                            <div class="text-slate-700 whitespace-pre-wrap">${aiExplanation}</div>
                                        </div>
                                    ` : ''}
                                </div>
                                <div class="flex flex-wrap gap-3 w-full">
                                    ${!aiExplanation ? `
                                        <button onclick="askAITutor()" class="flex-1 sm:flex-none bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-semibold py-2 px-4 rounded-lg transition-colors flex items-center justify-center border border-indigo-200" ${isAiLoading ? 'disabled' : ''}>
                                            ${isAiLoading ? '<i class="fas fa-spinner fa-spin mr-2"></i> Asking Tutor...' : '✨ Explain Step-by-Step'}
                                        </button>
                                    ` : ''}
                                    <button onclick="generateSimilarQuestion(${currentQuestion})" class="flex-1 sm:flex-none bg-purple-100 hover:bg-purple-200 text-purple-800 font-semibold py-2 px-4 rounded-lg transition-colors flex items-center justify-center border border-purple-300">
                                        ✨ Practice Similar Concept
                                    </button>
                                </div>
                            </div>
                        </div>` : ''}
                    </div>
                `;
            } 
            else if (viewState === 'results') {
                score = answers.reduce((acc, val, idx) => acc + (val === activeQuizData[idx].answer ? 1 : 0), 0);
                const percentage = Math.round((score / activeQuizData.length) * 100);
                
                let feedback = "";
                let themeColor = "blue";
                let icon = "fa-chart-line";
                
                if (percentage >= 90) { feedback = "Outstanding! You dominated this difficulty level."; themeColor = "green"; icon = "fa-trophy"; }
                else if (percentage >= 70) { feedback = "Great job! A solid score. Review mistakes to perfect skills."; themeColor = "blue"; icon = "fa-star"; }
                else if (percentage >= 50) { feedback = "Good effort! You've got the basics, but practice makes perfect."; themeColor = "amber"; icon = "fa-thumbs-up"; }
                else { feedback = "Keep practicing! Review the formulas/rules in the detailed breakdown below."; themeColor = "red"; icon = "fa-book-reader"; }

                app.innerHTML = `
                    <div class="bg-white p-6 sm:p-8 md:p-10 rounded-3xl shadow-xl fade-in max-w-4xl mx-auto w-full border border-slate-100">
                        <div class="text-center mb-8 pb-8 border-b border-slate-100">
                            <div class="w-20 h-20 sm:w-24 sm:h-24 mx-auto rounded-full flex items-center justify-center mb-5 bg-${themeColor}-100 text-${themeColor}-500 shadow-inner">
                                <i class="fas ${icon} text-3xl sm:text-4xl"></i>
                            </div>
                            <h2 class="text-2xl sm:text-3xl font-extrabold text-slate-800 mb-2">Set Completed!</h2>
                            <p class="text-slate-500 mb-6 text-sm sm:text-base max-w-md mx-auto">${feedback}</p>
                            
                            <div class="inline-block bg-slate-50 px-8 py-6 rounded-3xl border border-slate-100 shadow-sm mb-8">
                                <div class="text-4xl sm:text-6xl font-black text-${themeColor}-600 tracking-tighter mb-1">${percentage}%</div>
                                <div class="text-sm sm:text-base text-slate-600 font-semibold uppercase tracking-widest">${score} out of ${activeQuizData.length} Correct</div>
                                <div class="mt-3 inline-block bg-white border border-slate-200 text-slate-500 text-xs font-bold px-3 py-1 rounded-full shadow-sm">
                                    <i class="fas fa-layer-group text-${themeColor}-500 mr-1"></i> ${currentCategoryName}
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 w-full max-w-2xl mx-auto">
                                <button onclick="startLevel(currentDifficulty)" class="px-4 py-3 sm:py-4 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-md transition-all flex flex-col items-center justify-center text-sm group">
                                    <i class="fas fa-redo mb-1 group-hover:-rotate-90 transition-transform"></i> Retry Level
                                </button>
                                <button onclick="viewState='difficulty'; render()" class="px-4 py-3 sm:py-4 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-900 shadow-md transition-all flex flex-col items-center justify-center text-sm">
                                    <i class="fas fa-layer-group mb-1"></i> Change Level
                                </button>
                                <button onclick="restartQuiz()" class="px-4 py-3 sm:py-4 bg-slate-100 text-slate-700 border border-slate-300 rounded-xl font-bold hover:bg-slate-200 shadow-sm transition-all flex flex-col items-center justify-center text-sm">
                                    <i class="fas fa-exchange-alt mb-1"></i> Change Subject
                                </button>
                            </div>
                        </div>

                        <div>
                            <h3 class="text-xl sm:text-2xl font-bold text-slate-800 mb-6 flex items-center"><i class="fas fa-clipboard-list mr-3 text-blue-500"></i>Question Review</h3>
                            <div class="space-y-6">
                                ${activeQuizData.map((q, i) => `
                                    <div class="p-5 sm:p-6 rounded-2xl border-2 ${answers[i] === q.answer ? 'bg-white border-green-200 shadow-sm' : 'bg-red-50/30 border-red-200'}">
                                        <div class="flex items-start mb-4">
                                            <div class="mr-3 sm:mr-4 mt-0.5 flex-shrink-0">
                                                ${answers[i] === q.answer ? 
                                                    '<div class="w-6 h-6 sm:w-8 sm:h-8 rounded-full bg-green-500 flex items-center justify-center text-white text-xs sm:text-sm shadow-sm"><i class="fas fa-check"></i></div>' : 
                                                    '<div class="w-6 h-6 sm:w-8 sm:h-8 rounded-full bg-red-500 flex items-center justify-center text-white text-xs sm:text-sm shadow-sm"><i class="fas fa-times"></i></div>'
                                                }
                                            </div>
                                            <div>
                                                <span class="text-[10px] sm:text-xs font-black uppercase tracking-widest ${answers[i] === q.answer ? 'text-green-600' : 'text-red-600'} block mb-1">Question ${i+1}</span>
                                                <p class="font-bold text-slate-800 text-sm sm:text-base leading-snug">${q.q}</p>
                                            </div>
                                        </div>
                                        
                                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 sm:gap-3 mt-4 ml-9 sm:ml-12">
                                            ${q.options.map((opt, optIdx) => `
                                                <div class="p-2.5 sm:p-3 rounded-xl border ${
                                                    optIdx === q.answer ? 'bg-green-100 border-green-300 text-green-900 font-bold ring-1 ring-green-400' :
                                                    optIdx === answers[i] ? 'bg-red-100 border-red-300 text-red-900 font-semibold' : 'bg-white border-slate-200 text-slate-500'
                                                } flex justify-between items-center text-xs sm:text-sm">
                                                    <span>${opt}</span>
                                                    ${optIdx === q.answer ? '<i class="fas fa-check-circle text-green-600"></i>' : (optIdx === answers[i] ? '<i class="fas fa-times-circle text-red-600"></i>' : '')}
                                                </div>
                                            `).join('')}
                                        </div>
                                        <div class="mt-4 ml-9 sm:ml-12 text-xs sm:text-sm text-blue-900 bg-blue-50 p-4 rounded-xl border border-blue-200 shadow-inner">
                                            <strong class="flex items-center mb-1 text-blue-800"><i class="fas fa-graduation-cap mr-2"></i> Rule to Remember:</strong> 
                                            ${q.hint}
                                            <button onclick="generateSimilarQuestion(${i})" class="mt-3 bg-purple-100 hover:bg-purple-200 text-purple-800 font-semibold py-1.5 px-3 rounded-lg transition-colors flex items-center border border-purple-300 text-xs sm:text-sm">
                                                ✨ Practice Similar Concept
                                            </button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="mt-8 text-center">
                             <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="text-sm font-bold text-blue-600 hover:text-blue-800 bg-blue-50 hover:bg-blue-100 px-6 py-2.5 rounded-full transition-colors inline-flex items-center">
                                <i class="fas fa-arrow-up mr-2"></i> Back to Top
                            </button>
                        </div>
                    </div>
                `;
            }

            // Render AI Modal if active
            let modalContainer = document.getElementById('ai-modal-container');
            if (!modalContainer) {
                modalContainer = document.createElement('div');
                modalContainer.id = 'ai-modal-container';
                document.body.appendChild(modalContainer);
            }

            if (isSimilarLoading || activeGeneratedQuestion) {
                modalContainer.innerHTML = `
                    <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 fade-in">
                        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden border border-slate-200">
                            <div class="bg-purple-600 p-4 sm:p-6 text-white flex justify-between items-center">
                                <h3 class="font-bold text-lg flex items-center"><i class="fas fa-bolt mr-2 text-yellow-300"></i> AI Generated Practice</h3>
                                <button onclick="closeAIModal()" class="text-white hover:text-purple-200 transition-colors bg-purple-700 hover:bg-purple-800 rounded-full w-8 h-8 flex items-center justify-center"><i class="fas fa-times"></i></button>
                            </div>
                            <div class="p-6 sm:p-8">
                                ${isSimilarLoading ? `
                                    <div class="flex flex-col items-center justify-center py-12 text-purple-600">
                                        <i class="fas fa-circle-notch fa-spin text-5xl mb-4"></i>
                                        <p class="font-semibold text-lg">Crafting a new question...</p>
                                    </div>
                                ` : `
                                    <h4 class="text-lg sm:text-xl font-bold text-slate-800 mb-6">${activeGeneratedQuestion.q}</h4>
                                    <div class="space-y-3 mb-6">
                                        ${activeGeneratedQuestion.options.map((opt, idx) => {
                                            let btnClass = "border-slate-200 hover:border-purple-300 hover:bg-purple-50 text-slate-700";
                                            let icon = "";
                                            if (generatedQuestionFeedback !== null) {
                                                if (idx === activeGeneratedQuestion.answer) {
                                                    btnClass = "border-green-500 bg-green-50 text-green-800 font-bold";
                                                    icon = '<i class="fas fa-check-circle text-green-500"></i>';
                                                } else if (idx === generatedQuestionFeedback) {
                                                    btnClass = "border-red-500 bg-red-50 text-red-800";
                                                    icon = '<i class="fas fa-times-circle text-red-500"></i>';
                                                } else {
                                                    btnClass = "border-slate-200 opacity-50";
                                                }
                                            }
                                            return `
                                                <button ${generatedQuestionFeedback !== null ? 'disabled' : `onclick="handleGeneratedAnswer(${idx})"`} class="w-full text-left p-4 rounded-xl border-2 transition-all flex justify-between items-center ${btnClass}">
                                                    <span>${opt}</span>
                                                    ${icon}
                                                </button>
                                            `;
                                        }).join('')}
                                    </div>
                                    ${generatedQuestionFeedback !== null ? `
                                        <div class="p-4 bg-blue-50 border border-blue-200 rounded-xl text-blue-900 text-sm">
                                            <strong><i class="fas fa-lightbulb mr-1 text-blue-600"></i> Explanation:</strong> ${activeGeneratedQuestion.hint}
                                        </div>
                                    ` : ''}
                                `}
                            </div>
                        </div>
                    </div>
                `;
            } else {
                modalContainer.innerHTML = '';
            }
        }

        // Logic Controls
        function selectCategory(category) {
            currentCategory = category;
            viewState = 'difficulty';
            render();
            window.scrollTo(0, 0);
        }

        function startLevel(difficulty) {
            currentDifficulty = difficulty;
            
            // Filter database for requested category and difficulty
            let filteredQuestions = allQuizData.filter(q => q.cat === currentCategory && q.diff === difficulty);
            
            // Deep copy, shuffle the array, and slice to grab EXACTLY 20 questions for the set.
            activeQuizData = shuffleArray([...filteredQuestions]).slice(0, 20);
            
            // Set dynamic title text
            const catName = currentCategory === 'math' ? 'Quant Math' : 'Verbal Grammar';
            const diffName = difficulty.charAt(0).toUpperCase() + difficulty.slice(1);
            currentCategoryName = `${catName} - ${diffName} Level`;
            
            viewState = 'quiz'; 
            currentQuestion = 0; 
            answers = new Array(activeQuizData.length).fill(null); 
            showHint = false; 
            aiExplanation = null;
            render(); 
            window.scrollTo(0, 0);
        }

        function selectAnswer(idx) { 
            if (answers[currentQuestion] === null) {
                answers[currentQuestion] = idx; 
                showHint = true; // Auto-reveal hint/rule upon answering
                render(); 
            }
        }

        function prevQuestion() { 
            if(currentQuestion > 0) { 
                currentQuestion--; 
                showHint = answers[currentQuestion] !== null; 
                aiExplanation = null;
                render(); 
                window.scrollTo(0, 0);
            } 
        }

        function nextQuestion() {
            if(currentQuestion < activeQuizData.length - 1) {
                currentQuestion++; 
                showHint = answers[currentQuestion] !== null; 
                aiExplanation = null;
                render();
                window.scrollTo(0, 0);
            } else {
                viewState = 'results'; 
                render();
                window.scrollTo(0, 0);
            }
        }

        function toggleHint() { 
            showHint = !showHint; 
            render(); 
        }

        function restartQuiz() { 
            currentCategory = "";
            currentDifficulty = "";
            viewState = 'start';
            aiExplanation = null;
            closeAIModal();
            render(); 
            window.scrollTo(0, 0); 
        }

        // Gemini API Helpers
        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error('HTTP error ' + response.status);
                    return await response.json();
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        async function askAITutor() {
            if (isAiLoading) return;
            isAiLoading = true;
            render();

            const q = activeQuizData[currentQuestion];
            const prompt = `Act as an expert IT company aptitude test tutor. Explain step-by-step how to arrive at the correct answer for this ${currentCategory} question.
Question: ${q.q}
Options: ${q.options.join(', ')}
Correct Answer: ${q.options[q.answer]}
Standard Rule/Hint: ${q.hint}
Keep the explanation clear, encouraging, and under 3 paragraphs. Focus on the logical steps.`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "You are an expert tutor for aptitude tests. Be helpful, concise, and accurate." }] }
            };

            try {
                const data = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                aiExplanation = data.candidates?.[0]?.content?.parts?.[0]?.text || "Unable to generate explanation.";
            } catch (error) {
                console.error(error);
                aiExplanation = "Sorry, the AI Tutor is currently unavailable. Please check your connection and try again.";
            }
            
            isAiLoading = false;
            render();
        }

        async function generateSimilarQuestion(index) {
            if (isSimilarLoading) return;
            isSimilarLoading = true;
            activeGeneratedQuestion = null;
            generatedQuestionFeedback = null;
            render();

            const q = activeQuizData[index];
            const prompt = `Create a brand new, unique multiple-choice question that tests the exact same concept and difficulty as this one:
Original Question: ${q.q}
Original Options: ${q.options.join(', ')}
Category: ${q.cat}

Return a JSON object with the new question.`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "You are an expert test creator." }] },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            q: { type: "STRING", description: "The question text" },
                            options: { type: "ARRAY", items: { type: "STRING" }, description: "Exactly 4 options" },
                            answer: { type: "INTEGER", description: "0-based index of the correct option (0 to 3)" },
                            hint: { type: "STRING", description: "A brief explanation of how to solve it" }
                        },
                        required: ["q", "options", "answer", "hint"]
                    }
                }
            };

            try {
                const data = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (resultText) {
                    activeGeneratedQuestion = JSON.parse(resultText);
                }
            } catch (error) {
                console.error(error);
                closeAIModal();
                alert("Failed to generate a similar question. Please try again.");
            }
            
            isSimilarLoading = false;
            render();
        }

        function handleGeneratedAnswer(idx) {
            generatedQuestionFeedback = idx;
            render();
        }

        function closeAIModal() {
            activeGeneratedQuestion = null;
            generatedQuestionFeedback = null;
            isSimilarLoading = false;
            render();
        }

        // Init App
        window.onload = render;
    </script>
</body>
</html>
